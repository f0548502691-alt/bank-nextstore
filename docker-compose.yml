services:
  backend:
    build:
      context: .
      dockerfile: src/backend/BankDashboard.Api/Dockerfile
    image: bank-dashboard-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: src/frontend/bank-dashboard/Dockerfile
    image: bank-dashboard-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
