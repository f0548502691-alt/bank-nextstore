<section class="panel">
  <form class="filters" (ngSubmit)="applyFilters.emit()">
    <label>
      חיפוש חופשי
      <input
        name="search"
        type="search"
        placeholder="בנק, חשבון, סוג יתרה, מטבע או סטטוס"
        [ngModel]="filterModel().search"
        (ngModelChange)="searchChange.emit($event)"
      />
      <small class="field-hint">
        החיפוש מתבצע אוטומטית אחרי עצירה קצרה בהקלדה. ניתן לחפש כמה מילים, למשל:
        לאומי אופציות.
      </small>
      @if (searchPending()) {
        <small class="field-hint active">ממתין לסיום ההקלדה...</small>
      }
    </label>

    <label>
      בנק
      <select name="bankName" [(ngModel)]="filterModel().bankName">
        <option value="">כל הבנקים</option>
        @for (bank of filterOptions().banks; track bank) {
          <option [value]="bank">{{ bank }}</option>
        }
      </select>
    </label>

    <label>
      מטבע
      <select name="currency" [(ngModel)]="filterModel().currency">
        <option value="">כל המטבעות</option>
        @for (currency of filterOptions().currencies; track currency) {
          <option [value]="currency">{{ currency }}</option>
        }
      </select>
    </label>

    <label>
      סוג יתרה
      <select name="balanceType" [(ngModel)]="filterModel().balanceType">
        <option value="">כל הסוגים</option>
        @for (balanceType of filterOptions().balanceTypes; track balanceType) {
          <option [value]="balanceType">{{ balanceType }}</option>
        }
      </select>
    </label>

    <label>
      סטטוס
      <select name="status" [(ngModel)]="filterModel().status">
        <option value="">כל הסטטוסים</option>
        @for (status of filterOptions().statuses; track status) {
          <option [value]="status">{{ status }}</option>
        }
      </select>
    </label>

    <label>
      סכום מינימלי
      <input name="minAmount" type="number" min="0" [(ngModel)]="filterModel().minAmount" />
    </label>

    <label>
      סכום מקסימלי
      <input name="maxAmount" type="number" min="0" [(ngModel)]="filterModel().maxAmount" />
    </label>

    <label>
      מיון לפי
      <select name="sortBy" [(ngModel)]="filterModel().sortBy">
        @for (sortOption of sortOptions(); track sortOption.value) {
          <option [value]="sortOption.value">{{ sortOption.label }}</option>
        }
      </select>
    </label>

    <label>
      כיוון מיון
      <select name="sortDirection" [(ngModel)]="filterModel().sortDirection">
        <option value="desc">יורד</option>
        <option value="asc">עולה</option>
      </select>
    </label>

    <div class="filter-actions">
      <button type="submit" [disabled]="loading()">החלת סינון</button>
      <button type="button" class="secondary-button" (click)="clearFilters.emit()" [disabled]="loading()">
        ניקוי
      </button>
    </div>
  </form>
</section>
