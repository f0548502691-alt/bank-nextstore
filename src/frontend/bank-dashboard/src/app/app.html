<main class="dashboard-shell" dir="rtl">
  <section class="hero">
    <div>
      <p class="eyebrow">Bank Balances Dashboard</p>
      <h1>Dashboard יתרות בנק</h1>
      <p class="hero-description">
        צפייה, חיפוש וסינון של 5,000 תנועות יתרה מקובץ JSON מקומי.
      </p>
    </div>

    <button type="button" class="secondary-button" (click)="loadBalances()" [disabled]="loading()">
      רענון נתונים
    </button>
  </section>

  <app-summary-cards [summary]="summary()" [currencyTotals]="currencyTotals()" />

  <app-charts-panel [currencyTotals]="currencyTotals()" />

  <app-filter-panel
    [filterModel]="filterModel"
    [filterOptions]="filterOptions()"
    [sortOptions]="sortOptions"
    [loading]="loading()"
    [searchPending]="searchPending()"
    (applyFilters)="applyFilters()"
    (clearFilters)="clearFilters()"
    (searchChange)="scheduleSearch($event)"
  />

  @if (error()) {
    <section class="message error" role="alert">{{ error() }}</section>
  }

  <app-balance-table
    [balances]="balances()"
    [loading]="loading()"
    [totalCount]="totalCount()"
    [page]="page()"
    [totalPages]="totalPages()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="pageSizeOptions"
    [hasPreviousPage]="hasPreviousPage()"
    [hasNextPage]="hasNextPage()"
    (previousPage)="goToPreviousPage()"
    (nextPage)="goToNextPage()"
    (pageSizeChange)="changePageSize($event)"
  />
</main>
